# Конфиг mediaserver

[server]
bind_address = "0.0.0.0"
port = 9876

[storage]
media_root = "YOUR_PATH"
temp_dir = "YOUR_PATH"

[ffmpeg]
ffmpeg_path = "YOUR_PATH"
video_crf = 28
video_codec = "libx265"
video_preset = "medium"
video_max_width = 1920
photo_quality = 85

[database]
db_path = "YOUR_PATH/.mediaserver.db"

[admin]
# HTTP-эндпоинт для управления пользователями.
# localhost-only — доступ только с этого же ПК.
http_bind = "0.0.0.0:9877"
# Токен для Bearer-аутентификации админ-запросов.
# Смени на свой перед первым запуском!
api_token = "CHANGE_ME_admin_token_2026"
